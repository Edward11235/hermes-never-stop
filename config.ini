[watchdog]
# How long to wait before sending "continue" (seconds)
# Default: 180 (3 minutes)
timeout = 60

# How often to check for activity (seconds)
# Default: 30
interval = 30

# Method to send "continue"
# Options: signal, file, api
# signal - Use xdotool to inject keyboard events (recommended)
#          Works with prompt_toolkit-based apps like Hermes CLI
# file   - Write to ~/.hermes/input file (not supported by Hermes CLI)
# api    - POST to Hermes API endpoint (requires gateway running)
method = signal

# The text to send when Hermes is stalled
# Default: "continue"
# You can change this to any message you want Hermes to process
message = continue 

# API URL (only used if method = api)
api_url = http://localhost:8080
